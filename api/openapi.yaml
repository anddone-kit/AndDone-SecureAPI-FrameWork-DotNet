components:
  schemas:
    TokenRequest:
      example:
        token: 0LDGVDMPLL59EK2X
      properties:
        token:
          type: string
      type: object
    PFQuoteEsignRequest:
      example:
        merchantToken: rewgwgwehrtehwytrbwbtyjcxcvntrrtbcxbcb
        quoteKey: "1234"
        insuredName: John
        ipAddress: 101.205.12.14
        macAddress: 12-34-56-78-9A-BC
        captchaToken: rewgwgwehrtehwytrbwbtyjcxcvnt
        actionName: ""
      properties:
        merchantToken:
          description: This denotes the merchant token.
          type: string
        quoteKey:
          description: This denotes the quoteKey.
          type: string
        insuredName:
          description: This denotes the name of the insured.
          type: string
        ipAddress:
          description: This denotes the IP address of the client.
          type: string
        macAddress:
          description: This denotes the MAC address of the client.
          type: string
        captchaToken:
          description: This denotes the captchaToken.
          type: string
        actionName:
          description: This denotes the action name.
          type: string
      required:
      - insuredName
      - ipAddress
      - macAddress
      - merchantToken
      - quoteKey
      type: object
    PFRetrievePFAResponse:
      example: "{\"pfa\":\"Base64EncodedString\",\"mimetype\":\"application/pdf\"\
        ,\"extension\":\".pdf\",\"filename\":\"document.pdf\",\"message\":\"PFA retrieval\
        \ successful.\",\"isSuccess\":true,\"integrationID\":\"integration123\"}"
      type: string
    PFQuoteBookingRequest:
      example:
        quoteKey: "21563588"
        merchantToken: afwgetghweth
      properties:
        quoteKey:
          type: number
        merchantToken:
          type: string
      type: object
    QuoteResponse:
      example:
        id: ndDBAZxO
        quoteKey: quoteKey123
        pfType: TypeA
        isEndorsement: false
        merchantId: merchant123
        programId: 1
        paymentIntentId: paymentIntent123
        accountNumber: "12345678"
        quoteStatus: Created
        isActive: true
        premium: 1000
        additionalFees: 50
        downAmount: 200
        amountFinanced: 800
        financeCharge: 20
        totalPayments: 820
        paymentAmount: 82
        docStamp: 5
        firstDueDate: 2024-08-01
        apr: 3.5
        installments: 10
        batchId: batch123
        paymentsRetained: 2
        paymentRetainedAmount: 164
        retailAgentRegisterLoginURL: https://example.com/login
        insuredName: John Doe
        isEsignPFA: true
        nextPaymentDueDate: 2024-09-01
        lastPaymentDate: 2024-07-01
        isDownPaymentRequired: true
        isEsignRequired: true
        isDeleted: false
        createdOn: 2024-07-26
        createdBy: admin
        modifiedOn: 2024-07-27
        modifiedBy: admin
        unSignPFA: unsignedDocument123
        signPFA: signedDocument123
      properties:
        id:
          description: The unique identifier for the quote.
          type: string
        quoteKey:
          description: The key associated with the quote.
          type: number
        pFType:
          description: The type of premium finance.
          type: string
        isEndorsement:
          description: Indicates if the quote is an endorsement.
          type: boolean
        merchantId:
          description: The ID of the merchant.
          type: string
        programId:
          description: The ID of the program.
          type: integer
        paymentIntentId:
          description: The ID of the payment intent.
          type: string
        accountNumber:
          description: The account number.
          type: string
        quoteStatus:
          description: The status of the quote.
          enum:
          - None
          - Created
          - ESigned
          - SentForBooking
          - Booked
          - AccountCreated
          - Expired
          - EndorsementCreated
          - EndorsementESigned
          - EndorsementCompleted
          - Drafted
          type: string
        isActive:
          default: true
          description: Indicates if the quote is active.
          type: boolean
        premium:
          description: The premium amount.
          type: number
        additionalFees:
          description: Additional fees associated with the quote.
          type: number
        downAmount:
          description: The down payment amount.
          type: number
        amountFinanced:
          description: The amount financed.
          type: number
        financeCharge:
          description: The finance charge.
          type: number
        totalPayments:
          description: The total payments.
          type: number
        paymentAmount:
          description: The payment amount.
          type: number
        docStamp:
          description: The document stamp.
          type: number
        firstDueDate:
          description: The first due date.
          type: string
        apr:
          description: The annual percentage rate (APR).
          type: number
        installments:
          description: The number of installments.
          type: integer
        batchId:
          description: The batch ID.
          type: string
        paymentsRetained:
          description: The number of payments retained.
          type: integer
        paymentRetainedAmount:
          description: The amount retained from the payment.
          type: number
        retailAgentRegisterLoginURL:
          description: The URL for the retail agent register login.
          type: string
        insuredName:
          description: The name of the insured.
          type: string
        isEsignPFA:
          description: Indicates if eSign is required for the PFA.
          type: boolean
        nextPaymentDueDate:
          description: The next payment due date.
          type: string
        lastPaymentDate:
          description: The last payment date.
          type: string
        isDownPaymentRequired:
          description: Indicates if a down payment is required.
          type: boolean
        isEsignRequired:
          description: Indicates if eSign is required.
          type: boolean
        isDeleted:
          description: Indicates if the quote is deleted.
          type: boolean
        createdOn:
          description: The date when the quote was created.
          type: string
        createdBy:
          description: The user who created the quote.
          type: string
        modifiedOn:
          description: The date when the quote was last modified.
          type: string
        modifiedBy:
          description: The user who last modified the quote.
          type: string
        unSignPFA:
          description: The unsigned PFA document.
          type: string
        signPFA:
          description: The signed PFA document.
          type: string
      type: object
    QuoteResponseIntent:
      example:
        id: ndDBAZxO
        quoteKey: quoteKey123
